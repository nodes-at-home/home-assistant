# tv plug is turned off in automation lights_indoor_off_when_tv_switched_off

# (1) switch on desk wohnzimmer at morning, when undine is at home or flag input_boolean.switch_standby_by_family is on and family at home
# (2) switch on desk arbeitszimmer at morning, when andreas is at home or flag input_boolean.switch_standby_by_family is on and family at home
# (2) switch on tv at input_datetime.standby_television_switch_on_at, when family is at home
# (3) 

