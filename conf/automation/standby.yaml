  #     - condition: or
  #       conditions:
  #         - condition: and
  #           conditions:
  #             - condition: state
  #               entity_id: binary_sensor.workday_sensor
  #               state: 'on'
  #             - condition: time
  #               after: input_datetime.standup_workday
  #               before: input_datetime.sleep
  #         - condition: and
  #           conditions:
  #             - condition: state
  #               entity_id: binary_sensor.workday_sensor
  #               state: 'off'
  #             - condition: time
  #               after: input_datetime.standup_weekend
  #               before: input_datetime.sleep
  #   actions:
  #     - action: switch.turn_on
  #       target:
  #           entity_id:
  #             - switch.fernseher
  #             - switch.schreibtisch_arbeitszimmer
  #             - switch.schreibtisch_wohnzimmer

  - alias: standby_tv_switch_on
    id: standby_tv_switch_on
    triggers:
      - platform: time
        at: input_datetime.standby_television_switch_on_at
      - platform: state
        entity_id: group.family
        to: 'home'
    conditions:
      - condition: state
        entity_id: binary_sensor.prod_mode
        state: 'on'
      - condition: state
        entity_id: group.family
        state: 'home'
      - condition: time
        after: input_datetime.standby_television_switch_on_at
        before: input_datetime.sleep
    actions:
      - action: switch.turn_on
        target:
            entity_id:
              - switch.fernseher

  - alias: standby_desk_office_switch_on
    id: standby_desk_office_switch_on
    triggers:
      - platform: time
        at: input_datetime.standup_workday
      - platform: time
        at: input_datetime.standup_weekend
      - platform: state
        entity_id: person.andreas
        to: 'home'
      - platform: state
        entity_id: group.kids
        to: 'home'
    conditions:
      - condition: state
        entity_id: binary_sensor.prod_mode
        state: 'on'
      - condition: or
        conditions:
          - condition: state
            entity_id: person.andreas
            state: 'home'
          - condition: state
            entity_id: group.kids
            state: 'home'
      - condition: or
        conditions:
          - condition: and
            conditions:
              - condition: state
                entity_id: binary_sensor.workday_sensor
                state: 'on'
              - condition: time
                after: input_datetime.standup_workday
                before: input_datetime.sleep
          - condition: and
            conditions:
              - condition: state
                entity_id: binary_sensor.workday_sensor
                state: 'off'
              - condition: time
                after: input_datetime.standup_weekend
                before: input_datetime.sleep
    actions:
      - action: switch.turn_on
        target:
            entity_id:
              - switch.schreibtisch_arbeitszimmer

  - alias: standby_desk_office_switch_off
    id: standby_desk_office_switch_off
    triggers:
      - trigger: state
        entity_id: person.andreas
        to: 'not_home'
        for:
            minutes: 1
      - trigger: state
        entity_id: group.kids
        to: 'not_home'
        for:
            minutes: 1
    conditions:
      - condition: state
        alias: process only on production server
        entity_id: binary_sensor.prod_mode
        state: "on"
      - condition: and
        conditions:
          - condition: state
            entity_id: person.andreas
            state: 'not_home'
          - condition: state
            entity_id: group.kids
            state: 'not_home'
    actions:
      - service: switch.turn_off
        target:
            entity_id:
              - switch.schreibtisch_arbeitszimmer

  - alias: standby_desk_lounge_switch_on
    id: standby_desk_lounge_switch_on
    triggers:
      - platform: time
        at: input_datetime.standup_workday
      - platform: time
        at: input_datetime.standup_weekend
      - platform: state
        entity_id: person.undine
        to: 'home'
      - platform: state
        entity_id: group.kids
        to: 'home'
    conditions:
      - condition: state
        entity_id: binary_sensor.prod_mode
        state: 'on'
      - condition: or
        conditions:
          - condition: state
            entity_id: person.undine
            state: 'home'
          - condition: state
            entity_id: group.kids
            state: 'home'
      - condition: or
        conditions:
          - condition: and
            conditions:
              - condition: state
                entity_id: binary_sensor.workday_sensor
                state: 'on'
              - condition: time
                after: input_datetime.standup_workday
                before: input_datetime.sleep
          - condition: and
            conditions:
              - condition: state
                entity_id: binary_sensor.workday_sensor
                state: 'off'
              - condition: time
                after: input_datetime.standup_weekend
                before: input_datetime.sleep
    actions:
      - action: switch.turn_on
        target:
            entity_id:
              - switch.schreibtisch_wohnzimmer

  - alias: standby_desk_lounge_switch_off
    id: standby_desk_lounge_switch_off
    triggers:
      - trigger: state
        entity_id: person.undine
        to: 'not_home'
        for:
            minutes: 1
      - trigger: state
        entity_id: group.kids
        to: 'not_home'
        for:
            minutes: 1
    conditions:
      - condition: state
        alias: process only on production server
        entity_id: binary_sensor.prod_mode
        state: "on"
      - condition: and
        conditions:
          - condition: state
            entity_id: person.undine
            state: 'not_home'
          - condition: state
            entity_id: group.kids
            state: 'not_home'
    actions:
      - service: switch.turn_off
        target:
            entity_id:
              - switch.schreibtisch_wohnzimmer

  - alias: standby_switch_off_plugs_by_tv_off
    id: standby_switch_off_plugs_by_tv_off
    triggers:
        trigger: state
        entity_id: remote.sony_kd_55ag9
        from: "on"
        to: "off"
        for:
            minutes: 1
    conditions:
      - condition: state
        alias: process only on production server
        entity_id: binary_sensor.prod_mode
        state: "on"
      - condition: time
        after: input_datetime.tv_off_period_start
        before: input_datetime.tv_off_period_end
    actions:
      - delay:
            minutes: "{{ states ( 'input_number.tvoff_lightsoff_delay1' ) | int - 1 }}"
      - action: switch.turn_off
        target:
            entity_id:
              - switch.fernseher
              - switch.schreibtisch_arbeitszimmer
              - switch.schreibtisch_wohnzimmer

  - alias: standby_plugs_off_at_getting_out
    id: standby_plugs_off_at_getting_out
    triggers:
      - trigger: state
        entity_id: group.family
        to: 'not_home'
        for:
            minutes: 1
    conditions:
      - condition: state
        alias: process only on production server
        entity_id: binary_sensor.prod_mode
        state: "on"
    actions:
      - service: switch.turn_off
        target:
            entity_id:
              - switch.fernseher
              - switch.schreibtisch_arbeitszimmer
              - switch.schreibtisch_wohnzimmer
