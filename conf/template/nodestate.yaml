### 11.04.2026
###

  - binary_sensor:

      - name: nodestate_irrigation_valves
        unique_id: nodestate_irrigation_valves
        state: "{{ 
                   states ( 'input_boolean.irrigation_activated' ) == 'off'
                   or 
                   states ( 'binary_sensor.nodestate_relay_garden' ) == 'on' 
                   and states ( 'binary_sensor.nodestate_relay_garden2' ) == 'on'
                }}"

      - name: nodestate_ws2812@office_corrected
        unique_id: nodestate_ws2812_office_corrected
        state: "{{ 
                   states ( 'switch.schreibtisch_arbeitszimmer' ) == 'off'
                   or 
                   states ( 'binary_sensor.nodestate_ws2812_office' ) == 'on' 
                }}"

      - name: nodestate_pixel@kitchen_corrected
        unique_id: nodestate_pixel_kitchen_corrected
        state: "{{ 
                   states ( 'switch.schreibtisch_wohnzimmer' ) == 'off'
                   or 
                   states ( 'binary_sensor.nodestate_pixel_kitchen' ) == 'on' 
                }}"
